name: Refresh dashboard data

# 4am Central. GitHub cron is UTC and does not shift for daylight saving,
# so this fires 09:00 UTC = 4am CDT (summer) / 5am CST (winter). Harmless
# drift for a pre-dawn prep job. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull live data from Lift
        env:
          QB_USER_TOKEN: ${{ secrets.QB_USER_TOKEN }}
        run: python qb_pull.py

      - name: Commit refreshed data
        run: |
          git config user.name "renewance-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/projects.js
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "Refresh dashboard data ($(date -u +%Y-%m-%d))"
            git push
          fi
